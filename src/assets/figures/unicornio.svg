<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" stroke="black" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Body -->
  <ellipse cx="580" cy="580" rx="200" ry="130" fill="none" stroke="black" stroke-width="6"/>
  <!-- Neck -->
  <path d="M680,480 C700,420 720,370 710,320 C700,290 680,275 660,280"/>
  <path d="M740,500 C770,440 790,380 770,330 C758,295 735,278 710,282"/>

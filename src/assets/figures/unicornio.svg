  <ellipse cx="720" cy="290" rx="70" ry="55" fill="none" stroke="black" stroke-width="6"/>
  <!-- Horn -->
  <polygon points="720,235 700,195 740,195" fill="none" stroke="black" stroke-width="5"/>
  <!-- Horn stripes -->
  <line x1="704" y1="228" x2="736" y2="228" stroke-width="3"/>
  <line x1="708" y1="215" x2="732" y2="215" stroke-width="3"/>
  <line x1="712" y1="203" x2="728" y2="203" stroke-width="3"/>
  <!-- Ear -->
  <polygon points="690,248 670,215 706,225" fill="none" stroke="black" stroke-width="5"/>
  <!-- Eye -->
  <circle cx="745" cy="285" r="12" fill="black"/>
  <circle cx="749" cy="281" r="4" fill="none"/>
  <!-- Nostril -->
  <ellipse cx="775" cy="308" rx="8" ry="5" fill="black"/>
  <!-- Mouth (smile) -->
  <path d="M760,318 Q775,330 790,318" fill="none" stroke-width="4"/>
  <!-- Mane -->
  <path d="M680,258 C650,240 630,220 640,190 C645,175 660,170 670,185 C655,165 665,145 680,160 C668,140 680,125 695,142 C685,120 700,110 715,130" fill="none" stroke-width="8"/>
  <path d="M690,265 C660,260 635,265 625,285 C615,305 625,325 645,320" fill="none" stroke-width="8"/>
  <!-- Tail -->
  <path d="M380,520 C340,490 320,520 330,560 C340,600 370,610 380,590 C360,630 380,660 405,640 C395,670 415,680 430,660" fill="none" stroke-width="8"/>
  <!-- Legs -->
  <rect x="490" y="690" width="38" height="110" rx="14" fill="none" stroke="black" stroke-width="6"/>
  <rect x="560" y="695" width="38" height="108" rx="14" fill="none" stroke="black" stroke-width="6"/>
  <rect x="650" y="695" width="38" height="108" rx="14" fill="none" stroke="black" stroke-width="6"/>
  <rect x="720" y="690" width="38" height="110" rx="14" fill="none" stroke="black" stroke-width="6"/>
  <!-- Hooves -->
  <rect x="488" y="790" width="42" height="22" rx="8" fill="none" stroke="black" stroke-width="5"/>
  <rect x="558" y="793" width="42" height="22" rx="8" fill="none" stroke="black" stroke-width="5"/>
  <rect x="648" y="793" width="42" height="22" rx="8" fill="none" stroke="black" stroke-width="5"/>
  <rect x="718" y="790" width="42" height="22" rx="8" fill="none" stroke="black" stroke-width="5"/>
  <!-- Stars around horn -->
  <text x="640" y="178" font-size="28" stroke="none" fill="black">✦</text>
  <text x="760" y="175" font-size="22" stroke="none" fill="black">✦</text>
  <text x="760" y="210" font-size="16" stroke="none" fill="black">✦</text>
</svg>